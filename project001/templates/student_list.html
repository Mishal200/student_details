<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
body{
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 30px;
}
.container{
    width: 90%;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}
h1{
    text-align: center;
    color: #333;
}

.add-btn{
    text-decoration: none;
    background: green;
    color: white;
    padding: 10px 18px;
    border-radius: 5px;
}

table{
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}
th{
    background: #007bff;
    color: white;
    padding: 12px;
}

td{
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #ddd;
}

tr:hover{
    background: #f1f1f1;
}

.edit{
    background: orange;
    color: white;
    padding: 6px 12px;
    text-decoration: none;
    border-radius: 4px;
}
.delete{
    background: red;
    color: white;
    padding: 6px 12px;
    text-decoration: none;
    border-radius: 4px;
}

.edit:hover{
    background: darkorange;
}

.delete:hover{
    background: darkred;
}
</style>
</head>
<body>
    <h1>Student list</h1>
    <table>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Age</th>
            <th>Course</th>
            <th>Actions</th>
        </tr>
        {% for student in students %}
        <tr> 
            <td>
                {{student.name}}
            </td>
            <td>
                {{student.email}}
            </td>
            <td>
                {{student.age}}
            </td>
            <td>
                {{student.course}}
            </td>
            <td>
                <a href="../edit_student/{{student.id}}">Edit student</a>
                <a href="../delete_student/{{student.id}}">Delete student</a>
                
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
